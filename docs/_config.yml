# GitHub Pages Jekyll Configuration
theme: jekyll-theme-minimal
title: "🔰 MilitaerNews Posting Bot"
description: "Handbuch für Redakteure und Entwickler"
show_downloads: false

# Site settings
url: "https://militaernews.github.io"
baseurl: ""

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

plugins:
  - jekyll-seo-tag

# Navigation
nav_order: 1

# Exclude files
exclude:
  - "*.py"
  - "*.pyc"
  - "__pycache__"
  - "bot/"
  - "scripts/"
  - "test/"
  - ".git*"
  - "node_modules/"
  - "*.egg-info"
  - "USAGE.md"

# Include files
include:
  - "_pages"

# Sass
sass:
  style: compressed

# Collections
collections:
  pages:
    output: true
    permalink: /:name/
